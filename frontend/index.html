<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DR-RAG — Homeopathy Remedy Finder</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
</head>
<body>

<!-- ─── Auth Screen ─────────────────────────────────────────── -->
<div id="auth-screen" class="hidden">
    <div class="auth-wrap">
        <div class="auth-brand">
            <div class="brand-icon">⚕</div>
            <h1>DR-RAG</h1>
            <p>Homeopathic Repertorization Assistant</p>
        </div>
        <div id="auth-card" class="auth-card"></div>
    </div>
</div>

<!-- ─── App Screen ──────────────────────────────────────────── -->
<div id="app-screen" class="hidden">
    <aside class="sidebar">
        <div class="sidebar-brand">
            <span class="brand-icon-sm">⚕</span>
            <span class="brand-name">DR-RAG</span>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-btn" data-view="query">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span>Query</span>
            </button>
            <button class="nav-btn" data-view="history">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                <span>History</span>
            </button>
            <button class="nav-btn" data-view="saved">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
                <span>Saved Rubrics</span>
            </button>
        </nav>
        <div class="sidebar-user">
            <div class="user-avatar" id="user-avatar">?</div>
            <div class="user-meta">
                <div class="user-name" id="sidebar-user-name">User</div>
                <button class="logout-btn" id="logout-btn">Sign out</button>
            </div>
        </div>
    </aside>
    <main class="main-content" id="main-content"></main>
</div>

<!-- ─── Toast ──────────────────────────────────────────────── -->
<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>

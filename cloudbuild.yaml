# Google Cloud Build — build and deploy to Cloud Run
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_SERVICE_NAME=dr-rag-api,_REGION=us-central1
#
# Required secrets (set in Cloud Run environment or Secret Manager):
#   - OPENROUTER_API_KEY  (or OPENAI_API_KEY)
#   - JWT_SECRET_KEY
#
# Optional env vars for Cloud Run:
#   - USE_OPENROUTER=true
#   - CORS_ORIGINS=https://your-frontend.example.com
#   - DATABASE_URL=sqlite:////data/api_users.db

substitutions:
  _SERVICE_NAME: dr-rag-api
  _REGION: us-central1

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'
    timeout: '1200s'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '10'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'USE_OPENROUTER=true'

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY

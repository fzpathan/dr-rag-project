# Google Cloud Build — build and deploy to Cloud Run
#
# Prerequisites:
#   1. Create an Artifact Registry repository:
#      gcloud artifacts repositories create dr-rag \
#        --repository-format=docker --location=us-central1
#
#   2. Create secrets in Secret Manager:
#      echo -n "your-key" | gcloud secrets create openrouter-api-key --data-file=-
#      echo -n "$(python -c 'import secrets; print(secrets.token_urlsafe(48))')" | \
#        gcloud secrets create jwt-secret-key --data-file=-
#
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_SERVICE_NAME=dr-rag-api,_REGION=us-central1
#
# Required secrets (set via Cloud Run --set-secrets flag):
#   - OPENROUTER_API_KEY  (or OPENAI_API_KEY)
#   - JWT_SECRET_KEY
#
# Optional env vars for Cloud Run:
#   - USE_OPENROUTER=true
#   - CORS_ORIGINS=https://your-frontend.example.com
#   - DATABASE_URL=sqlite:////data/api_users.db

substitutions:
  _SERVICE_NAME: dr-rag-api
  _REGION: us-central1
  _REPOSITORY: dr-rag

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '-t'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest'
      - '.'
    timeout: '1200s'

  # Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA'
      - '--region'
      - '${_REGION}'
      - '--platform'
      - 'managed'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '300'
      - '--concurrency'
      - '10'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'USE_OPENROUTER=true'

images:
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:$COMMIT_SHA'
  - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE_NAME}:latest'

timeout: '1800s'

options:
  logging: CLOUD_LOGGING_ONLY
